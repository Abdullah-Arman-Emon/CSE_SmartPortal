server {
    server_name logicloop.farefin.com;

    # Allow larger uploads (default nginx limit is 1MB and breaks file uploads).
    client_max_body_size 50M;

    # Single catch-all for ALL backend routes. The trailing slash on proxy_pass
    # strips the /api prefix, so /api/v1/... , /api/admin/... , /api/student/... ,
    # /api/utility/... , /api/guest/... all reach the backend correctly.
    # Any NEW backend route works automatically with no nginx change.
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /resources/ {
        proxy_pass http://127.0.0.1:8080/resources/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/logicloop.farefin.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/logicloop.farefin.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = logicloop.farefin.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name logicloop.farefin.com;
    return 404; # managed by Certbot


}