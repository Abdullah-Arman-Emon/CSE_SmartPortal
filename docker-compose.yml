services:
  mysql:
    image: mysql:8.0
    container_name: csedu_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-Password}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-csedu}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csedu-network

  backend:
    build:
      context: ./backend-main/backend-main
    container_name: csedu_backend
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8000"
    env_file:
      - ./backend-main/backend-main/.env
    environment:
      DATABASE_URL: "mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/${MYSQL_DATABASE}"
      SECRET_KEY: "${SECRET_KEY:-supersecretkey}"
      RESOURCE_HUB: "${RESOURCE_HUB:-RESOURCES}"
    volumes:
      - ./backend-main/backend-main:/app
      - ./backend-main/backend-main/RESOURCES:/app/RESOURCES
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    networks:
      - csedu-network

  frontend:
    build:
      context: ./Frontend-main/Frontend-main/frontend
      args:
        # For deployed setups the frontend should call the proxy's /api path (same origin).
        # Use '/api' so the browser sends requests to the same host/port that serves the frontend
        VITE_BACKEND_URL: "${VITE_BACKEND_URL:-/api}"
    container_name: csedu_frontend
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - csedu-network

  nginx:
    image: nginx:alpine
    container_name: csedu_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - csedu-network

volumes:
  mysql_data:

networks:
  csedu-network:
    driver: bridge
