services:
  mysql:
    image: mysql:8.0
    container_name: csedu_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Password
      MYSQL_DATABASE: csedu
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-main/backend-main
    container_name: csedu_backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ./backend-main/backend-main/.env
    environment:
      DATABASE_URL: mysql+pymysql://root:Password@mysql/csedu
      SECRET_KEY: supersecretkey
      RESOURCE_HUB: RESOURCES
    volumes:
      - ./backend-main/backend-main:/app
      - ./backend-main/backend-main/RESOURCES:/app/RESOURCES
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080", "--proxy-headers", "--forwarded-allow-ips", "*"]

  frontend:
    build:
      context: ./Frontend-main/Frontend-main/frontend
      args:
        # Same-origin relative base -> all calls go to /api/... and nginx forwards
        # /api/ to the backend. Works for every current & future backend route.
        VITE_BACKEND_URL: /api
    container_name: csedu_frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  mysql_data:
