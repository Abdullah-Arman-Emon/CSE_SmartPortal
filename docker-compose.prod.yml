# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Or: docker compose --profile prod up -d

version: '3.8'

services:
  mysql:
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-Password}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-csedu}"

  backend:
    restart: always
    environment:
      DATABASE_URL: "mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql/${MYSQL_DATABASE}"
      SECRET_KEY: "${SECRET_KEY:-supersecretkey}"
      RESOURCE_HUB: "${RESOURCE_HUB:-RESOURCES}"

  frontend:
    restart: always
    environment:
      VITE_BACKEND_URL: "${VITE_BACKEND_URL:-/api}"

  nginx:
    restart: always
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - csedu-network

volumes:
  mysql_data:
    driver: local

networks:
  csedu-network:
    driver: bridge
